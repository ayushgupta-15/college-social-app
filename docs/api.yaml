openapi: 3.0.3
info:
  title: CampusConnect API
  description: |
    REST API for the CampusConnect college social platform.
    Built with Golang + Gin. All endpoints (except /auth/*) require a valid Firebase JWT in the Authorization header.
  version: 1.0.0
  contact:
    name: CampusConnect

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api.campusconnect.app/api/v1
    description: Production (Railway)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:          { type: string, format: uuid }
        username:    { type: string }
        full_name:   { type: string }
        bio:         { type: string }
        avatar_url:  { type: string }
        college:     { type: string }
        major:       { type: string }
        grad_year:   { type: integer }
        is_open_to_referral: { type: boolean }
        created_at:  { type: string, format: date-time }

    Post:
      type: object
      properties:
        id:         { type: string, format: uuid }
        author:     { $ref: '#/components/schemas/User' }
        content:    { type: string }
        media_url:  { type: string }
        post_type:  { type: string, enum: [general, opportunity, announcement] }
        like_count: { type: integer }
        created_at: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id:        { type: string, format: uuid }
        author:    { $ref: '#/components/schemas/User' }
        content:   { type: string }
        created_at: { type: string, format: date-time }

    Group:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        subject:     { type: string }
        admin:       { $ref: '#/components/schemas/User' }
        member_count: { type: integer }
        is_private:  { type: boolean }
        created_at:  { type: string, format: date-time }

    Event:
      type: object
      properties:
        id:           { type: string, format: uuid }
        organizer:    { $ref: '#/components/schemas/User' }
        title:        { type: string }
        description:  { type: string }
        location:     { type: string }
        event_date:   { type: string, format: date-time }
        banner_url:   { type: string }
        max_capacity: { type: integer }
        is_online:    { type: boolean }
        meet_link:    { type: string }
        created_at:   { type: string, format: date-time }

    Message:
      type: object
      properties:
        id:          { type: string, format: uuid }
        sender_id:   { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        content:     { type: string }
        is_read:     { type: boolean }
        created_at:  { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id:          { type: string, format: uuid }
        type:        { type: string }
        message:     { type: string }
        is_read:     { type: boolean }
        created_at:  { type: string, format: date-time }

    Error:
      type: object
      properties:
        code:    { type: integer }
        message: { type: string }

# ─────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────
paths:

  # AUTH
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firebase_token, username, full_name, college]
              properties:
                firebase_token: { type: string }
                username:       { type: string }
                full_name:      { type: string }
                college:        { type: string }
                major:          { type: string }
                grad_year:      { type: integer }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Verify Firebase token and return session info
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firebase_token]
              properties:
                firebase_token: { type: string }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate session / revoke token
      responses:
        '200':
          description: Logged out successfully

  # USERS
  /users/me:
    get:
      tags: [Users]
      summary: Get current user's profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    patch:
      tags: [Users]
      summary: Update current user's profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:         { type: string }
                avatar_url:  { type: string }
                major:       { type: string }
                grad_year:   { type: integer }
                is_open_to_referral: { type: boolean }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /users/{id}:
    get:
      tags: [Users]
      summary: Get a user's public profile
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404':
          description: User not found

  # POSTS
  /posts:
    get:
      tags: [Posts]
      summary: Get paginated feed of posts
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: type
          schema: { type: string, enum: [general, opportunity, announcement] }
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Post' }
    post:
      tags: [Posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:   { type: string }
                media_url: { type: string }
                post_type: { type: string, enum: [general, opportunity, announcement] }
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Post
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }
    delete:
      tags: [Posts]
      summary: Delete a post (author only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Post deleted

  /posts/{id}/like:
    post:
      tags: [Posts]
      summary: Like / unlike a post (toggle)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Like toggled

  /posts/{id}/comments:
    get:
      tags: [Posts]
      summary: Get comments for a post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Comment' }
    post:
      tags: [Posts]
      summary: Add a comment to a post
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }

  # GROUPS
  /groups:
    get:
      tags: [Groups]
      summary: List all public groups
      parameters:
        - in: query
          name: subject
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Group' }
    post:
      tags: [Groups]
      summary: Create a study group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                description: { type: string }
                subject:     { type: string }
                is_private:  { type: boolean }
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Group' }

  /groups/{id}/join:
    post:
      tags: [Groups]
      summary: Join a study group
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Joined group

  /groups/{id}/leave:
    post:
      tags: [Groups]
      summary: Leave a study group
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Left group

  # EVENTS
  /events:
    get:
      tags: [Events]
      summary: List upcoming events
      parameters:
        - in: query
          name: is_online
          schema: { type: boolean }
        - in: query
          name: from_date
          schema: { type: string, format: date }
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Event' }
    post:
      tags: [Events]
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, event_date]
              properties:
                title:        { type: string }
                description:  { type: string }
                location:     { type: string }
                event_date:   { type: string, format: date-time }
                max_capacity: { type: integer }
                is_online:    { type: boolean }
                meet_link:    { type: string }
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Event' }

  /events/{id}/register:
    post:
      tags: [Events]
      summary: Register for an event
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Registered

  # MESSAGING
  /messages/{chatId}:
    get:
      tags: [Messaging]
      summary: Get message history for a direct chat
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: string }
          description: Composed of sorted user IDs joined by underscore
        - in: query
          name: before
          schema: { type: string, format: date-time }
          description: Cursor for pagination
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Message' }

  /messages/send:
    post:
      tags: [Messaging]
      summary: Send a direct message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver_id, content]
              properties:
                receiver_id: { type: string, format: uuid }
                content:     { type: string }
                media_url:   { type: string }
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }

  # NOTIFICATIONS
  /notifications:
    get:
      tags: [Notifications]
      summary: Get current user's notifications
      parameters:
        - in: query
          name: unread_only
          schema: { type: boolean }
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Notification' }

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200':
          description: All marked as read
