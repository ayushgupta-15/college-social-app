services:
  - type: web
    name: college-social-app        # live at: https://college-social-app-d7mm.onrender.com
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false        # set in Render dashboard — Neon connection string
      - key: FIREBASE_CREDENTIALS
        sync: false        # set in Render dashboard — paste full service account JSON
